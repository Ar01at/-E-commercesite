<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ecommerce Site</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/logo.png" alt="Logo" width="60" height="50" class="me-2">
                <h3 class="m-0" style="font-weight: 700; font-size: 1.5rem;">
                    <span style="color: #09ff00;">Online</span>
                    <span style="color: #ff0000;">Shop</span>
                </h3>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav m-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item"><a class="nav-link px-3" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="productdetails.html">Product Details</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link px-3" href="signup.html">Signup</a></li>
            </div>
            <div class="collapse navbar-collapse mr-3" id="navbarContent" style="list-style: none;">
                <li class="nav-item ms-lg-3">
                    <div class="input-group" style="max-width: 500px; width: 100%;">
                        <input type="text" class="form-control custom-search" placeholder="Search products...">
                        <button class="btn" type="button"
                            style="background-color: #00b7ff; color: white;">Search</button>
                    </div>
                </li>
                <li class="nav-item ms-3">
                    <a href="#" class="position-relative">
                        <img src="images/cart.svg" alt="Cart" width="35" height="35">
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                            style="font-size: 0.7rem;">0</span>
                    </a>
                </li>
                </ul>
            </div>
        </div>
    </nav>
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="index.html">Home</a></li>
            <li class="breadcrumb-item"><a href="#">Login</a></li>
        </ol>
    </nav>
    <div class="container-fluid h-100">
        <div class="row h-100">
            <div class="col-lg-6 d-flex align-items-center justify-content-center bg-white p-4">
                <div class="card login-card p-4 p-md-5">
                    <div class="card-body">
                        <h4 class="text-custom-orange fw-bold mb-5">Login Here</h4>
                        <p class="text-muted small mb-1">Welcome back !!!</p>
                        <h1 class="mb-4" style="font-weight: 850; font-size: 2.8rem; letter-spacing: -1px;">Sign in</h1>
                        <form action="#" method="POST">
                            <div class="mb-3">
                                <label class="form-label small text-secondary fw-bold">Email</label>
                                <input type="email" class="form-control input-custom" placeholder="test@gmail.com"
                                    required>
                            </div>
                            <div class="mb-4">
                                <div class="d-flex justify-content-between align-items-center mb-1">
                                    <label class="form-label small text-secondary fw-bold">Password</label>
                                    <a href="#" class="forgot-link">Forgot Password?</a>
                                </div>
                                <input type="password" class="form-control input-custom" value="12345678" required>
                            </div>
                            <button type="submit" class="btn btn-primary">
                                SIGN IN &nbsp; →
                            </button>
                        </form>

                        <div class="mt-5">
                            <p class="small text-muted">
                                I don't have an account? <a href="#"
                                    class="text-custom-orange fw-bold text-decoration-none">Sign up</a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 bg-custom-peach d-none d-lg-flex align-items-center justify-content-center">
                <div class="text-center">
                    <img src="images/sign.jpg" alt="Login Illustration" class="img-fluid"
                        style="max-height: 450px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.05));">
                </div>
            </div>

        </div>
    </div>
    <footer class="bg-dark text-white py-4 mt-5 d-flex justify-content-between align-items-center">
        <div class="ms-3">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <img src="images/logo.png" alt="Logo" width="60" height="50" class="me-2">
                <h3 class="m-0" style="font-weight: 700; font-size: 1.5rem;">
                    <span style="color: #00ff00;">Online</span>
                    <span style="color: #ff0000;">Shop</span>
                </h3>
            </a>
        </div>
        <div>
            <p>&copy; 2026 Online Shop. All Rights Reserved.</p>
        </div>
        <div class="me-3">
            <span><i class="bi bi-facebook"></i></span>
            <span><i class="bi bi-youtube"></i></span>
            <span><i class="bi bi-twitter"></i></span>
            <span><i class="bi bi-instagram"></i></span>
            <span><i class="bi bi-whatsapp"></i></span>
        </div>
    </footer>
    <script src="main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
